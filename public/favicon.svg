<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Geometric Globe (International Relations) -->
  <g stroke="#6B46C1" stroke-width="2.5">
    <!-- Outer contour -->
    <circle cx="32" cy="32" r="24" />
    <!-- Longitude orbit -->
    <ellipse cx="32" cy="32" rx="10" ry="24" />
    <!-- Latitude equator -->
    <path d="M 8.5 32 C 18 40, 46 40, 55.5 32" />
  </g>

  <!-- Stylized Leaf/Human Figure (Anthropology & Development) -->
  <g stroke="#D4A373" stroke-width="3">
    <!-- Organic sweeping contour -->
    <path d="M 32 56 C 56 56, 68 28, 54 14 C 40 0, 32 20, 32 56 Z" fill="#D4A373" fill-opacity="0.15" />
    <!-- Inner vein / upward gesture -->
    <path d="M 32 56 Q 44 40, 50 20" />
  </g>
</svg>
